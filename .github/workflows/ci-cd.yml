name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions: {}

env:
  APP_NAME: infinito

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run dependency audit
        run: bun audit || true

      - name: Run linter
        run: bun run lint

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test:run

      - name: Check coverage (min 80%)
        run: bun run test:coverage
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  release:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create release
        uses: googleapis/release-please-action@c3fc4de07084f75a2b61a5b933069bda6edf3d5c # v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  generate-metadata:
    needs: release
    if: needs.release.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      priority: ${{ steps.detect.outputs.priority }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Detect update priority
        id: detect
        run: |
          VERSION="${{ needs.release.outputs.tag_name }}"

          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" "${PREV_TAG}..HEAD" 2>/dev/null || echo "")
          else
            COMMITS=$(git log --pretty=format:"%s" HEAD~20..HEAD 2>/dev/null || echo "")
          fi

          PRIORITY="normal"
          MESSAGE="Bug fixes and improvements"

          if echo "$COMMITS" | grep -qiE "(security-fix|cve-[0-9]|vulnerability|xss|injection|auth-bypass|exploit|csrf|privilege.escalation)"; then
            if echo "$COMMITS" | grep -qiE "(critical|urgent|breaking)"; then
              PRIORITY="critical"
              MESSAGE="Critical security update"
            else
              PRIORITY="security"
              MESSAGE="Security update"
            fi
          elif echo "$COMMITS" | grep -qiE "(critical|urgent|breaking)"; then
            PRIORITY="critical"
            MESSAGE="Critical update"
          fi

          echo "priority=$PRIORITY" >> $GITHUB_OUTPUT

      - name: Create update metadata
        run: |
          VERSION="${{ needs.release.outputs.tag_name }}"
          PRIORITY="${{ steps.detect.outputs.priority }}"

          case "$PRIORITY" in
            critical)
              MESSAGE="Critical security update. Restart required."
              FORCE_RESTART="true"
              ;;
            security)
              MESSAGE="Security update. Please restart to apply."
              FORCE_RESTART="false"
              ;;
            *)
              MESSAGE="Bug fixes and improvements"
              FORCE_RESTART="false"
              ;;
          esac

          cat > update-metadata.json << EOF
          {
            "version": "${VERSION#v}",
            "priority": "$PRIORITY",
            "message": "$MESSAGE",
            "forceRestart": $FORCE_RESTART,
            "releaseDate": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          echo "Generated metadata:"
          cat update-metadata.json

      - name: Upload metadata to release
        uses: softprops/action-gh-release@26994186c0ac3ef5cae75ac16aa32e8153525f77 # v1
        with:
          tag_name: ${{ needs.release.outputs.tag_name }}
          files: update-metadata.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: [test, release]
    if: needs.release.outputs.release_created
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate icons
        run: bun run generate:icons

      - name: Prepare migrations
        run: |
          Remove-Item -Recurse -Force resources/migrations -ErrorAction SilentlyContinue
          Copy-Item -Recurse src/database/migrations resources/migrations

      - name: Build and publish Windows
        run: |
          bun run build
          bunx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    needs: [test, release]
    if: needs.release.outputs.release_created
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate icons
        run: bun run generate:icons

      - name: Prepare migrations
        run: bun run build:migrations

      - name: Build and publish macOS (arm64 + x64)
        run: |
          bun run build
          bunx electron-builder --mac --arm64 --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [release, build-macos]
    if: needs.release.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Trigger homebrew-apps update
        run: |
          VERSION="${{ needs.release.outputs.tag_name }}"
          VERSION="${VERSION#v}"
          curl -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.HOMEBREW_TAP_TOKEN }}" \
            https://api.github.com/repos/blas-works/homebrew-apps/dispatches \
            -d "{\"event_type\":\"update-cask\",\"client_payload\":{\"app\":\"${{ env.APP_NAME }}\",\"version\":\"${VERSION}\"}}"

  build-linux:
    needs: [test, release]
    if: needs.release.outputs.release_created
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate icons
        run: bun run generate:icons

      - name: Prepare migrations
        run: bun run build:migrations

      - name: Build and publish Linux
        run: |
          bun run build
          bunx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
